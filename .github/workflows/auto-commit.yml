name: auto-commit

on:
  schedule:
    # Multiple cron lines = multiple runs per day. The bot will respect
    # DAILY_CAP from bot.conf so you can't accidentally exceed it.
    # All times are UTC.
    - cron: '13 14 * * *'    # ~14:13 UTC daily
    # Uncomment more lines for darker green squares (more commits/day):
    # - cron: '47 18 * * *'  # ~18:47 UTC
    # - cron: '23 22 * * *'  # ~22:23 UTC
    # - cron: '37  3 * * *'  # ~03:37 UTC
    # - cron: '11  9 * * *'  # ~09:11 UTC

  workflow_dispatch:
    inputs:
      commits:
        description: 'How many commits this run (overrides bot.conf COMMITS_PER_RUN)'
        required: false
        default: ''
        type: string

# Repository variables required (Settings → Secrets and variables → Actions → Variables):
#   AUTHOR_NAME       e.g. "S-O-U-L-S-E-E-K-E-R"
#   AUTHOR_EMAIL      verified email or noreply form (counts toward graph)

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    env:
      AUTHOR_NAME:  ${{ vars.AUTHOR_NAME }}
      AUTHOR_EMAIL: ${{ vars.AUTHOR_EMAIL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run auto-commit
        run: |
          chmod +x ./auto-commit.sh
          if [ -n "${{ inputs.commits }}" ]; then
            ./auto-commit.sh --commits "${{ inputs.commits }}"
          else
            ./auto-commit.sh
          fi
