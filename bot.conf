# bot.conf — auto-commit cadence and behavior.
# Sourced by auto-commit.sh. Any setting here can also be overridden via
# environment variable on the command line:
#
#   COMMITS_PER_RUN=5 ./auto-commit.sh
#
# All "range" settings accept either a single number ("3") or a min-max range
# ("3-7") — the latter picks a uniformly-random value each run.

# ---- How many commits to make per script invocation ----
# 1     = boring single-commit day (light green square)
# 3-5   = medium-green
# 8-15  = darker green
# 15-30 = deep green (heavy contribution-graph saturation)
COMMITS_PER_RUN="3-7"

# ---- Random delay (seconds) between multiple commits in the same run ----
# Spreads the timestamps so all commits in a "burst" don't land in the same
# second. Each commit needs to push, so very short values aren't useful.
INTER_COMMIT_DELAY="20-180"

# ---- Random jitter at the start of a run ----
# Useful when multiple cron schedules might fire close together. 0 disables.
# Example: "0-1800" sleeps 0-30 minutes before doing anything.
START_JITTER_SECS="0"

# ---- Skip entire days ----
# Comma-separated UTC weekday names (mon,tue,wed,thu,fri,sat,sun).
# Leave blank to commit every day. (For "every day green" — leave blank.)
SKIP_DAYS=""

# ---- Restrict commits to certain hours of the UTC day ----
# Format: "min-max" (24h UTC). Blank = any hour.
# Example: "13-23" makes the bot only run between 1pm-11pm UTC.
ALLOW_HOURS=""

# ---- Hard cap on commits per UTC day ----
# 0 = unlimited. Otherwise refuses to push more than N commits today
# (counted by author email matching, all branches).
# Useful as a runaway-protection if you stack many cron schedules.
DAILY_CAP=30

# ---- What to write in each commit ----
# Always:  bumps Count Commits in README, appends to commit-log.md.
# This pool feeds the commit message itself; entries get a "#N" suffix.
COMMIT_MESSAGES=(
    "Daily activity log"
    "Auto-bump counter"
    "Routine sync"
    "Scheduled tick"
    "Daily commit"
    "Activity update"
    "Counter increment"
    "Heartbeat commit"
    "Auto rotation"
    "Daily journal entry"
    "Status update"
    "Periodic sync"
    "Maintenance tick"
    "Regular update"
    "Background sweep"
    "Routine entry"
    "Schedule run"
    "Auto log"
    "Tick update"
    "Cycle commit"
)
